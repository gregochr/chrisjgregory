<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="45" fill="#F7F4F0" stroke="#C4A882" stroke-width="3"/>

  <!-- Sun rays (right side only, clipped) -->
  <g opacity="0.9">
    <line x1="50" y1="22" x2="50" y2="16" stroke="#C4A882" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="66" y1="28" x2="70" y2="23" stroke="#C4A882" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="74" y1="44" x2="80" y2="44" stroke="#C4A882" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="74" y1="60" x2="80" y2="60" stroke="#C4A882" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="66" y1="76" x2="70" y2="81" stroke="#C4A882" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="50" y1="82" x2="50" y2="88" stroke="#C4A882" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Moon crescent (left side) — dark slate -->
  <circle cx="46" cy="52" r="20" fill="#4A5568"/>
  <circle cx="56" cy="46" r="16" fill="#F7F4F0"/>

  <!-- Sun arc (right side) — tan accent, half circle -->
  <path d="M50 32 A20 20 0 0 1 50 72" fill="none" stroke="#C4A882" stroke-width="3" stroke-linecap="round"/>

  <!-- Small dot at the transition point -->
  <circle cx="50" cy="32" r="2" fill="#C4A882"/>
  <circle cx="50" cy="72" r="2" fill="#C4A882"/>
</svg>
